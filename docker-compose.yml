services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gptar
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    command: sh -c "pnpm exec prisma generate && pnpm exec prisma migrate deploy && pnpm run dev"
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gptar?schema=public
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super-secret-change-me-please
      EMAIL_DOMAIN: ${EMAIL_DOMAIN:-example.com}
      IMAP_HOST: ${IMAP_HOST:-imap.gmail.com}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_SECURE: ${IMAP_SECURE:-true}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASS: ${IMAP_PASS:-}
      PRISMA_ENGINES_MIRROR: https://registry.npmmirror.com/-/binary/prisma
      PORT: "3001"
    ports:
      - "13001:3001"
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3100:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
